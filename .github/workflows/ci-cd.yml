name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit
        
      - name: Run unit tests
        run: npm run test:unit

      - name: Use Secret Token
        env:
          MY_TOKEN: ${{ secrets.MY_SECRET_TOKEN }}
        run: echo "Секрет успішно підключено (значення приховано)!"